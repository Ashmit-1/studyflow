services:
  backend:
    build: ./backend
    container_name: studyflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgresql
      - redis

  frontend:
    build: ./FrontEnd
    container_name: studyflow-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgresql:
    image: postgres:17
    container_name: studyflow-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studyflow
    ports:
      - "5433:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: studyflow-redis
    ports:
      - "6379:6379"

volumes:
  postgresql_data:
